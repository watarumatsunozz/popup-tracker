<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>POPUP Entry Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #dde1ea;
    --queue-accent: #2563eb;
    --entry-accent: #1d4ed8;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --btn-hover: rgba(37,99,235,0.06);
    --selected-queue: #2563eb;
    --selected-entry: #1d4ed8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== LANG BTN ===== */
  .lang-btn {
    font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .lang-btn:active { background: var(--btn-hover); color: var(--text); }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }

  .event-name {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .live-time {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  /* ===== MODE TABS ===== */
  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .mode-tab {
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: var(--surface);
    color: var(--text-dim);
    letter-spacing: 0.04em;
    position: relative;
  }

  .mode-tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: transparent;
    transition: background 0.2s;
  }

  .mode-tab.active[data-mode="queue"] {
    color: var(--queue-accent);
    background: rgba(37,99,235,0.06);
  }
  .mode-tab.active[data-mode="queue"]::after { background: var(--queue-accent); }

  .mode-tab.active[data-mode="entry"] {
    color: var(--entry-accent);
    background: rgba(29,78,216,0.06);
  }
  .mode-tab.active[data-mode="entry"]::after { background: var(--entry-accent); }

  .mode-tab .tab-count {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    margin-left: 6px;
    opacity: 0.6;
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ===== SECTION LABEL ===== */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  /* ===== BUTTON GRID ===== */
  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .choice-btn {
    flex: 1;
    min-width: 0;
    padding: 18px 8px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .choice-btn:active {
    transform: scale(0.96);
  }

  .choice-btn.selected-queue {
    border-color: var(--queue-accent);
    background: rgba(37,99,235,0.10);
    color: var(--queue-accent);
    box-shadow: 0 0 0 1px rgba(37,99,235,0.25);
  }

  .choice-btn.selected-entry {
    border-color: var(--entry-accent);
    background: rgba(29,78,216,0.10);
    color: var(--entry-accent);
    box-shadow: 0 0 0 1px rgba(29,78,216,0.25);
  }

  .choice-btn .btn-icon {
    display: block;
    font-size: 22px;
    margin-bottom: 4px;
  }

  /* 人数ボタンは横並び */
  .count-btn-group {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .count-btn {
    padding: 20px 8px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .count-btn:active { transform: scale(0.96); }

  .count-btn.selected-queue {
    border-color: var(--queue-accent);
    background: rgba(37,99,235,0.10);
    color: var(--queue-accent);
    box-shadow: 0 0 0 1px rgba(37,99,235,0.25);
  }
  .count-btn.selected-entry {
    border-color: var(--entry-accent);
    background: rgba(29,78,216,0.10);
    color: var(--entry-accent);
    box-shadow: 0 0 0 1px rgba(29,78,216,0.25);
  }

  .count-btn .count-num {
    display: block;
    font-size: 26px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .count-btn .count-label {
    display: block;
    font-size: 9px;
    opacity: 0.5;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* ===== RECORD BTN ===== */
  .record-btn-wrap {
    padding: 0 0 8px;
    flex-shrink: 0;
  }

  .record-btn {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .record-btn.queue-mode {
    background: var(--queue-accent);
    color: #fff;
    box-shadow: 0 4px 24px rgba(37,99,235,0.3);
  }
  .record-btn.entry-mode {
    background: var(--entry-accent);
    color: #ffffff;
    box-shadow: 0 4px 24px rgba(29,78,216,0.3);
  }

  .record-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  .record-btn:not(:disabled):active {
    transform: scale(0.98);
  }

  .record-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    animation: ripple 0.5s linear;
    pointer-events: none;
  }

  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* ===== UNDO + BOTTOM ===== */
  .bottom-bar {
    padding: 8px 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .undo-btn {
    flex: 1;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .undo-btn:not(:disabled):active {
    background: var(--btn-hover);
    color: var(--text);
  }

  .undo-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .log-btn {
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .log-btn:active { background: var(--btn-hover); }

  .log-count-badge {
    background: var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: #ffffff;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border-radius: 14px;
    padding: 20px 28px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    min-width: 200px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .toast-icon {
    font-size: 36px;
    margin-bottom: 6px;
  }

  .toast-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .toast-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* ===== LOG DRAWER ===== */
  .log-drawer {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .log-drawer.open {
    transform: translateY(0);
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .drawer-title {
    font-size: 15px;
    font-weight: 700;
  }

  .drawer-close {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }

  .drawer-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-cell {
    background: var(--surface);
    padding: 12px 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
  }
  .stat-num.queue { color: var(--queue-accent); }
  .stat-num.entry { color: var(--entry-accent); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
  }

  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-type-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-type-dot.queue { background: var(--queue-accent); }
  .log-type-dot.entry { background: var(--entry-accent); }

  .log-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 50px;
  }

  .log-detail {
    flex: 1;
    font-size: 13px;
    font-weight: 700;
  }

  .log-count {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }
  .log-count.queue { color: var(--queue-accent); }
  .log-count.entry { color: var(--entry-accent); }

  .export-btn {
    margin: 12px 16px;
    padding: 16px;
    width: calc(100% - 32px);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    flex-shrink: 0;
  }
  .export-btn:active { background: var(--btn-hover); }

  /* Empty state */
  .empty-log {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="event-name">MAYLA POPUP · Taipei</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="live-time" id="liveTime">--:--</div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">日本語</button>
  </div>
</div>

<!-- MODE TABS -->
<div class="mode-tabs">
  <button class="mode-tab active" data-mode="queue" onclick="setMode('queue')">
    🔵 待機列<span class="tab-count" id="queueTabCount">0</span>
  </button>
  <button class="mode-tab" data-mode="entry" onclick="setMode('entry')">
    🟢 入場<span class="tab-count" id="entryTabCount">0</span>
  </button>
</div>

<!-- MAIN FORM -->
<div class="main" id="mainForm">

  <!-- 性別／構成 -->
  <div>
    <div class="section-label">性別 / グループ構成</div>
    <div class="btn-group" style="flex-wrap:wrap;">
      <button class="choice-btn" data-group="gender" data-val="female" onclick="select(this,'gender')">
        <span class="btn-icon">👩</span>女性
      </button>
      <button class="choice-btn" data-group="gender" data-val="male" onclick="select(this,'gender')">
        <span class="btn-icon">👨</span>男性
      </button>
      <button class="choice-btn" data-group="gender" data-val="mixed" onclick="select(this,'gender')">
        <span class="btn-icon">👫</span>混合
      </button>
      <button class="choice-btn" data-group="gender" data-val="unknown" onclick="select(this,'gender')">
        <span class="btn-icon">🧑</span>不明
      </button>
    </div>
  </div>

  <!-- 年代 -->
  <div>
    <div class="section-label">年代</div>
    <div class="btn-group">
      <button class="choice-btn" data-group="age" data-val="10s" onclick="select(this,'age')">
        <span class="btn-icon">🎓</span>10代
      </button>
      <button class="choice-btn" data-group="age" data-val="20s" onclick="select(this,'age')">
        <span class="btn-icon">✨</span>20代
      </button>
      <button class="choice-btn" data-group="age" data-val="30s" onclick="select(this,'age')">
        <span class="btn-icon">💼</span>30代
      </button>
      <button class="choice-btn" data-group="age" data-val="40s" onclick="select(this,'age')">
        <span class="btn-icon">🏠</span>40代
      </button>
      <button class="choice-btn" data-group="age" data-val="50s+" onclick="select(this,'age')">
        <span class="btn-icon">🌟</span>50+
      </button>
    </div>
  </div>

  <!-- 人数 -->
  <div>
    <div class="section-label">人数</div>
    <div class="count-btn-group">
      <button class="count-btn" data-group="count" data-val="1" onclick="select(this,'count')">
        <span class="count-num">1</span>
        <span class="count-label">人</span>
      </button>
      <button class="count-btn" data-group="count" data-val="2" onclick="select(this,'count')">
        <span class="count-num">2</span>
        <span class="count-label">人</span>
      </button>
      <button class="count-btn" data-group="count" data-val="3" onclick="select(this,'count')">
        <span class="count-num">3</span>
        <span class="count-label">人</span>
      </button>
      <button class="count-btn" data-group="count" data-val="4+" onclick="select(this,'count')">
        <span class="count-num">4+</span>
        <span class="count-label">人</span>
      </button>
    </div>
  </div>

</div>

<!-- RECORD BUTTON -->
<div class="record-btn-wrap" style="padding: 0 14px 8px;">
  <button class="record-btn queue-mode" id="recordBtn" disabled onclick="record(event)">
    記録する
  </button>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="undo-btn" id="undoBtn" disabled onclick="undo()">↩ 取消（Undo）</button>
  <button class="log-btn" onclick="openLog()">
    📋 <span class="log-count-badge" id="totalCount">0</span>
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">✓</div>
  <div class="toast-text" id="toastText">記録完了</div>
  <div class="toast-sub" id="toastSub"></div>
</div>

<!-- LOG DRAWER -->
<div class="log-drawer" id="logDrawer">
  <div class="drawer-header">
    <div class="drawer-title">📋 記録ログ</div>
    <button class="drawer-close" onclick="closeLog()">閉じる</button>
  </div>
  <div class="drawer-stats">
    <div class="stat-cell">
      <div class="stat-num queue" id="statQueue">0</div>
      <div class="stat-label queue-label">QUEUE（等候）</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num entry" id="statEntry">0</div>
      <div class="stat-label entry-label">ENTRY（入場）</div>
    </div>
  </div>
  <div class="log-list" id="logList">
    <div class="empty-log">まだ記録がありません</div>
  </div>
  <button class="export-btn" onclick="exportCSV()">⬇ CSV エクスポート</button>
</div>

<script>
  // ===== I18N =====
  const I18N = {
    zh: {
      font: "'Noto Sans TC', sans-serif",
      langBtnLabel: '日本語',
      eventName: 'MAYLA POPUP · 台北',
      tabQueue: '🔵 等候列',
      tabEntry: '🟢 入場',
      sectionGender: '性別 / 組合',
      sectionAge: '年齡層',
      sectionCount: '人數',
      genderFemale: '女性', genderMale: '男性', genderMixed: '混合', genderUnknown: '不明',
      age10: '10代', age20: '20代', age30: '30代', age40: '40代', age50: '50+',
      count1: '人', count2: '人', count3: '人', count4: '人',
      recordBtnQueue: '🔵 列隊記錄',
      recordBtnEntry: '🟢 入場記錄',
      undoBtn: '↩ 取消',
      drawerTitle: '📋 記錄',
      statQueueLabel: 'QUEUE（等候）',
      statEntryLabel: 'ENTRY（入場）',
      emptyLog: '尚無記錄',
      exportBtn: '⬇ 匯出 CSV',
      toastUndo: '已取消',
      toastQueue: '等候列 記錄完成',
      toastEntry: '入場 記錄完成',
      closeBtn: '關閉',
      noRecords: '尚無記錄',
      personUnit: '人',
    },
    ja: {
      font: "'Noto Sans JP', sans-serif",
      langBtnLabel: '繁體中文',
      eventName: 'MAYLA POPUP · Taipei',
      tabQueue: '🔵 待機列',
      tabEntry: '🟢 入場',
      sectionGender: '性別 / グループ構成',
      sectionAge: '年代',
      sectionCount: '人数',
      genderFemale: '女性', genderMale: '男性', genderMixed: '混合', genderUnknown: '不明',
      age10: '10代', age20: '20代', age30: '30代', age40: '40代', age50: '50+',
      count1: '人', count2: '人', count3: '人', count4: '人',
      recordBtnQueue: '🔵 並び記録',
      recordBtnEntry: '🟢 入場記録',
      undoBtn: '↩ 取消（Undo）',
      drawerTitle: '📋 記録ログ',
      statQueueLabel: 'QUEUE（列）',
      statEntryLabel: 'ENTRY（入場）',
      emptyLog: 'まだ記録がありません',
      exportBtn: '⬇ CSV エクスポート',
      toastUndo: '取り消しました',
      toastQueue: '待機列 記録完了',
      toastEntry: '入場 記録完了',
      closeBtn: '閉じる',
      noRecords: 'まだ記録がありません',
      personUnit: '人',
    }
  };

  let lang = 'zh';

  function t(key) { return I18N[lang][key] || key; }

  function applyLang() {
    const L = I18N[lang];
    document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'ja';
    document.body.style.fontFamily = L.font;

    document.querySelector('.event-name').textContent = L.eventName;
    document.getElementById('langBtn').textContent = L.langBtnLabel;

    // Tabs
    const tabs = document.querySelectorAll('.mode-tab');
    tabs[0].childNodes[0].textContent = L.tabQueue;
    tabs[1].childNodes[0].textContent = L.tabEntry;

    // Section labels
    const labels = document.querySelectorAll('.section-label');
    labels[0].textContent = L.sectionGender;
    labels[1].textContent = L.sectionAge;
    labels[2].textContent = L.sectionCount;

    // Gender buttons
    const gBtns = document.querySelectorAll('[data-group="gender"]');
    gBtns[0].lastChild.textContent = L.genderFemale;
    gBtns[1].lastChild.textContent = L.genderMale;
    gBtns[2].lastChild.textContent = L.genderMixed;
    gBtns[3].lastChild.textContent = L.genderUnknown;

    // Age buttons
    const aBtns = document.querySelectorAll('[data-group="age"]');
    [L.age10, L.age20, L.age30, L.age40, L.age50].forEach((lbl, i) => {
      aBtns[i].lastChild.textContent = lbl;
    });

    // Count buttons — unit label only
    document.querySelectorAll('.count-label').forEach(el => {
      el.textContent = L.personUnit;
    });

    // Undo
    document.getElementById('undoBtn').textContent = L.undoBtn;

    // Drawer
    document.querySelector('.drawer-title').textContent = L.drawerTitle;
    document.querySelector('.drawer-close').textContent = L.closeBtn;
    document.querySelector('.stat-label.queue-label').textContent = L.statQueueLabel;
    document.querySelector('.stat-label.entry-label').textContent = L.statEntryLabel;
    document.querySelector('.export-btn').textContent = L.exportBtn;

    // Re-render record btn & log
    checkReady();
    renderLog();
  }

  function toggleLang() {
    lang = lang === 'zh' ? 'ja' : 'zh';
    applyLang();
  }

  // ===== STATE =====
  let currentMode = 'queue';
  let selections = { gender: null, age: null, count: null };
  let records = [];
  let lastRecord = null;

  function genderLabel(val) {
    const map = { female: t('genderFemale'), male: t('genderMale'), mixed: t('genderMixed'), unknown: t('genderUnknown') };
    return map[val] || val;
  }
  function ageLabel(val) {
    const map = { '10s': t('age10'), '20s': t('age20'), '30s': t('age30'), '40s': t('age40'), '50s+': t('age50') };
    return map[val] || val;
  }

  // ===== TIME =====
  function updateTime() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('liveTime').textContent = hh + ':' + mm;
  }
  updateTime();
  setInterval(updateTime, 10000);

  // ===== MODE SWITCH =====
  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === mode);
    });
    const btn = document.getElementById('recordBtn');
    btn.className = 'record-btn ' + (mode === 'queue' ? 'queue-mode' : 'entry-mode');
    clearSelections();
  }

  function clearSelections() {
    selections = { gender: null, age: null, count: null };
    document.querySelectorAll('.choice-btn, .count-btn').forEach(b => {
      b.classList.remove('selected-queue', 'selected-entry');
    });
    checkReady();
  }

  // ===== SELECT =====
  function select(btn, group) {
    document.querySelectorAll(`[data-group="${group}"]`).forEach(b => {
      b.classList.remove('selected-queue', 'selected-entry');
    });
    const cls = currentMode === 'queue' ? 'selected-queue' : 'selected-entry';
    btn.classList.add(cls);
    selections[group] = btn.dataset.val;
    checkReady();
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function checkReady() {
    const ready = selections.gender && selections.age && selections.count;
    const btn = document.getElementById('recordBtn');
    btn.disabled = !ready;
    const baseLabel = currentMode === 'queue' ? t('recordBtnQueue') : t('recordBtnEntry');
    if (ready) {
      const g = genderLabel(selections.gender);
      const a = ageLabel(selections.age);
      const c = selections.count;
      btn.textContent = `${baseLabel} — ${g} ${a} ${c}${t('personUnit')}`;
    } else {
      btn.textContent = baseLabel;
    }
  }

  // ===== GAS SYNC =====
  let GAS_URL = "https://script.google.com/macros/s/AKfycbwMWjcZxFAh2JxJaGfW04HGfLslrxTWbBmHbnAK6PpzQeIxgaMT5Hg6UiartbJYMxvh/exec";

  async function postToGAS(rec) {
    if (!GAS_URL) return;
    try {
      const params = new URLSearchParams({
        timestamp: rec.timestamp,
        date:      rec.date,
        hour:      rec.hour,
        type:      rec.type,
        gender:    rec.gender,
        age_group: rec.age_group,
        count:     rec.count,
        event:     I18N.ja.eventName
      });
      await fetch(GAS_URL + '?' + params.toString(), {
        method: "GET",
        mode: "no-cors"
      });
    } catch (err) { console.warn("GAS送信失敗:", err); }
  }

  // ===== RECORD =====
  function record(e) {
    if (!selections.gender || !selections.age || !selections.count) return;

    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const timestamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    const date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const hour = pad(now.getHours());
    const countNum = selections.count === '4+' ? 4 : parseInt(selections.count);

    const rec = {
      id: Date.now(),
      timestamp, date, hour,
      type: currentMode,
      gender: selections.gender,
      age_group: selections.age,
      count: countNum,
      count_raw: selections.count
    };

    records.unshift(rec);
    lastRecord = rec;

    postToGAS(rec); // 非同期送信・UIはブロックしない

    if (e && e.currentTarget) {
      const btn = e.currentTarget;
      const circle = document.createElement('span');
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      circle.classList.add('ripple');
      circle.style.width = circle.style.height = diameter + 'px';
      circle.style.left = '0px'; circle.style.top = '0px';
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 600);
    }

    updateCounts();
    showToast(rec);
    clearSelections();
    document.getElementById('undoBtn').disabled = false;
    if (navigator.vibrate) navigator.vibrate([40, 20, 40]);
  }

  // ===== UNDO =====
  function undo() {
    if (!lastRecord) return;
    records = records.filter(r => r.id !== lastRecord.id);
    lastRecord = null;
    updateCounts();
    document.getElementById('undoBtn').disabled = true;
    showToast(null, true);
    if (navigator.vibrate) navigator.vibrate(80);
  }

  // ===== COUNTS =====
  function updateCounts() {
    const qCount = records.filter(r => r.type === 'queue').length;
    const eCount = records.filter(r => r.type === 'entry').length;
    // update tab counts (preserve tab text, only update badge span)
    document.getElementById('queueTabCount').textContent = qCount;
    document.getElementById('entryTabCount').textContent = eCount;
    document.getElementById('totalCount').textContent = records.length;
    document.getElementById('statQueue').textContent = qCount;
    document.getElementById('statEntry').textContent = eCount;
    renderLog();
  }

  // ===== TOAST =====
  let toastTimer;
  function showToast(rec, isUndo = false) {
    const toast = document.getElementById('toast');
    if (isUndo) {
      document.getElementById('toastIcon').textContent = '↩';
      document.getElementById('toastText').textContent = t('toastUndo');
      document.getElementById('toastSub').textContent = '';
    } else {
      document.getElementById('toastIcon').textContent = rec.type === 'queue' ? '🔵' : '🟢';
      document.getElementById('toastText').textContent = rec.type === 'queue' ? t('toastQueue') : t('toastEntry');
      document.getElementById('toastSub').textContent =
        `${genderLabel(rec.gender)} · ${ageLabel(rec.age_group)} · ${rec.count}${t('personUnit')} · ${rec.timestamp.slice(11,16)}`;
    }
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  // ===== LOG DRAWER =====
  function openLog() {
    renderLog();
    document.getElementById('logDrawer').classList.add('open');
  }
  function closeLog() {
    document.getElementById('logDrawer').classList.remove('open');
  }

  function renderLog() {
    const list = document.getElementById('logList');
    if (records.length === 0) {
      list.innerHTML = `<div class="empty-log">${t('emptyLog')}</div>`;
      return;
    }
    list.innerHTML = records.map(r => `
      <div class="log-item">
        <div class="log-type-dot ${r.type}"></div>
        <div class="log-time">${r.timestamp.slice(11,16)}</div>
        <div class="log-detail">
          ${genderLabel(r.gender)} · ${ageLabel(r.age_group)}
          <span style="opacity:0.4;font-size:11px;margin-left:4px;">${r.type.toUpperCase()}</span>
        </div>
        <div class="log-count ${r.type}">${r.count}</div>
      </div>
    `).join('');
  }

  // ===== CSV EXPORT =====
  function exportCSV() {
    if (records.length === 0) { alert(t('noRecords')); return; }
    const header = 'timestamp,date,hour,type,gender,age_group,count';
    const rows = records.map(r =>
      `${r.timestamp},${r.date},${r.hour},${r.type},${r.gender},${r.age_group},${r.count}`
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `popup_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ===== INIT =====
  setMode('queue');
  applyLang();
</script>
</body>
</html>
